<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GainsHub | Welcome</title>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; text-align: center; }
        .hero { max-width: 600px; padding: 20px; }
        h1 { font-size: 3rem; margin-bottom: 10px; background: linear-gradient(to right, #3b82f6, #10b981); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        p { color: #94a3b8; font-size: 1.2rem; line-height: 1.6; }
        .btn { display: inline-block; background: #3b82f6; color: white; padding: 15px 40px; border-radius: 30px; text-decoration: none; font-weight: bold; margin-top: 30px; transition: transform 0.2s; }
        .btn:hover { transform: scale(1.05); }
    </style>
</head>
<body>
    <div class="hero">
        <h1>GainsHub</h1>
        <p>Your intelligent Indian diet assistant. Track meals, analyze your physical health, and get personalized diet plans for weight gain, loss, or peak performance.</p>
        <a href="{% url 'setup' %}" class="btn">Get Started</a>
    </div>
</body>
</html>
