<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GainsHub | Personalize</title>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; padding: 20px; }
        .card { max-width: 500px; margin: 50px auto; background: #1e293b; padding: 30px; border-radius: 15px; border: 1px solid #334155; }
        input, select { width: 100%; padding: 12px; margin: 10px 0 20px 0; background: #0f172a; border: 1px solid #334155; color: white; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #3b82f6; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        h2 { margin-top: 0; }
    </style>
</head>
<body>
    <div class="card">
        <h2>About You</h2>
        <p style="color: #94a3b8; font-size: 0.9rem;">We use these details to calculate your BMI and suggest the best plan for you.</p>
        <form method="POST">
            {% csrf_token %}
            <label>Full Name</label>
            <input type="text" name="name" placeholder="Enter your name" required>
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <div><label>Age</label><input type="number" name="age" required></div>
                <div><label>Goal</label>
                    <select name="goal">
                        <option value="gain">Weight Gain</option>
                        <option value="lose">Fat Loss</option>
                        <option value="maintain">Maintenance</option>
                    </select>
                </div>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <div><label>Height (cm)</label><input type="number" name="height" placeholder="e.g. 175" required></div>
                <div><label>Current Weight (kg)</label><input type="number" step="0.1" name="weight" placeholder="e.g. 65" required></div>
            </div>

            <button type="submit">Complete Setup</button>
        </form>
    </div>
</body>
</html>
